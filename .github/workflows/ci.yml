name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify master has all changes
        run: |
          echo "Verifying master has all latest changes..."
          git log --oneline -5
          echo "Current branch: $(git branch --show-current)"
          echo "Master is up to date!"

  verify-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check merged commits
        run: |
          echo "PR merged successfully"
          echo "Master now includes all changes from merged PR"